<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="img/office logo.jpeg">
    <title>Sign In | Stackcraft Technologies</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="fontawesome-free-7.0.0-web/css/all.min.css">
    <link rel="stylesheet" href="fontawesome-free-7.0.0-web/css/fontawesome.min.css">
</head>

<body>

    <div class="login-wrapper">

        <div class="login-card reveal-up">

            <div class="login-logo">
                <img src="img/office logo.jpeg" alt="Stackcraft Logo" class="nav-brand-img">
                StackCraft
            </div>

            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access the secure portal.</p>
            </div>

            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="engineer@stackcraft.tech" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Login<i
                        class="fa-solid fa-arrow-right"></i></button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="sign.html">Sign Up</a></p>
            </div>

        </div>
    </div>

    <script src="toast.js"></script>
    <script src="login.js"></script>
</body>

</html>
